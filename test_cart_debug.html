<!DOCTYPE html>
<html>
<head>
    <title>Cart Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Cart Debug Test</h1>
    
    <div class="test-section">
        <h2>Step 1: Get Session ID</h2>
        <button onclick="getSessionId()">Get Session ID</button>
        <div id="session-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Step 2: Check Cart (should be empty initially)</h2>
        <button onclick="getCart()">Get Cart</button>
        <div id="cart-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Step 3: Add Product to Cart</h2>
        <button onclick="addToCart()">Add Product (ID: 1 - Fresh Apples)</button>
        <div id="add-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Step 4: Check Cart Again (should have item)</h2>
        <button onclick="getCartAfter()">Get Cart After Adding</button>
        <div id="cart-after-result"></div>
    </div>
    
    <div class="test-section">
        <h2>Console Logs:</h2>
        <div id="console-logs"></div>
    </div>

    <script>
        let sessionId = '';
        
        // Override console.log to display on page
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const logsDiv = document.getElementById('console-logs');
            logsDiv.innerHTML += `<p>${args.join(' ')}</p>`;
        };
        
        function getSessionId() {
            sessionId = localStorage.getItem('grocery_session_id');
            if (!sessionId) {
                sessionId = 'test-session-' + Date.now();
                localStorage.setItem('grocery_session_id', sessionId);
            }
            
            document.getElementById('session-result').innerHTML = 
                `<div class="result success">Session ID: ${sessionId}</div>`;
        }
        
        async function getCart() {
            try {
                const response = await fetch('http://localhost:5000/api/cart', {
                    method: 'GET',
                    headers: {
                        'X-Session-ID': sessionId,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('cart-result').innerHTML = 
                    `<div class="result success">Cart Response: ${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                document.getElementById('cart-result').innerHTML = 
                    `<div class="result error">Error: ${error.message}</div>`;
            }
        }
        
        async function addToCart() {
            try {
                const response = await fetch('http://localhost:5000/api/cart/add', {
                    method: 'POST',
                    headers: {
                        'X-Session-ID': sessionId,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_id: 1,
                        quantity: 1
                    })
                });
                
                const data = await response.json();
                document.getElementById('add-result').innerHTML = 
                    `<div class="result success">Add to Cart Response: ${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                document.getElementById('add-result').innerHTML = 
                    `<div class="result error">Error: ${error.message}</div>`;
            }
        }
        
        async function getCartAfter() {
            try {
                const response = await fetch('http://localhost:5000/api/cart', {
                    method: 'GET',
                    headers: {
                        'X-Session-ID': sessionId,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('cart-after-result').innerHTML = 
                    `<div class="result success">Cart After Adding: ${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                document.getElementById('cart-after-result').innerHTML = 
                    `<div class="result error">Error: ${error.message}</div>`;
            }
        }
        
        // Auto-get session ID on page load
        window.onload = function() {
            getSessionId();
        };
    </script>
</body>
</html>
