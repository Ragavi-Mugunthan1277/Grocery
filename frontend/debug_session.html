<!DOCTYPE html>
<html>
<head>
    <title>Debug Session</title>
</head>
<body>
    <h1>Session Debug</h1>
    <button onclick="showSession()">Show Session</button>
    <button onclick="clearSession()">Clear Session</button>
    <button onclick="testAddToCart()">Test Add to Cart</button>
    <button onclick="testGetCart()">Test Get Cart</button>
    <div id="output"></div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
        function log(message) {
            document.getElementById('output').innerHTML += '<p>' + message + '</p>';
        }
        
        function showSession() {
            log('Current session ID: ' + localStorage.getItem('grocery_session_id'));
            log('API service session: ' + apiService.sessionId);
        }
        
        function clearSession() {
            localStorage.removeItem('grocery_session_id');
            log('Session cleared');
        }
        
        async function testAddToCart() {
            try {
                log('Session ID: ' + apiService.sessionId);
                log('Adding item to cart...');
                const result = await apiService.addToCart(1, 1);
                log('Success: ' + JSON.stringify(result));
            } catch (error) {
                log('Error: ' + error.message);
            }
        }
        
        async function testGetCart() {
            try {
                log('Session ID: ' + apiService.sessionId);
                log('Getting cart...');
                const result = await apiService.getCart();
                log('Cart contents: ' + JSON.stringify(result));
            } catch (error) {
                log('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
