<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GroceryStore</title>
    <meta name="description" content="Complete your purchase">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo">🛒 GroceryStore</a>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="index.html#categories">Categories</a></li>
                <li>
                    <a href="cart.html" class="cart-icon">
                        🛒 Cart
                        <span class="cart-count" id="cartCount" style="display:none">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="checkout-page">
        <div class="container">
            <div class="checkout-breadcrumb">
                <a href="cart.html">← Back to Cart</a>
            </div>
            <h1 class="section-title">Checkout</h1>
            <div class="checkout-container">
                <div class="checkout-form">
                    <h2>Shipping Information</h2>
                    <form id="checkoutForm" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name *</label>
                                <input type="text" id="firstName" name="firstName" required autocomplete="given-name">
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name *</label>
                                <input type="text" id="lastName" name="lastName" required autocomplete="family-name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="10-digit mobile number">
                        </div>
                        <div class="form-group">
                            <label for="address">Shipping Address *</label>
                            <textarea id="address" name="address" rows="3" required autocomplete="street-address"
                                      placeholder="House/Flat No., Street, City, State, PIN"></textarea>
                        </div>

                        <h2 style="margin-top: 2rem;">Payment Method</h2>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method *</label>
                            <select id="paymentMethod" name="paymentMethod" required>
                                <option value="">Select Payment Method</option>
                                <option value="cash_on_delivery">Cash on Delivery</option>
                                <option value="credit_card">Credit Card</option>
                                <option value="debit_card">Debit Card</option>
                                <option value="digital_wallet">Digital Wallet (UPI)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="notes">Order Notes (Optional)</label>
                            <textarea id="notes" name="notes" rows="2"
                                      placeholder="Any special instructions for your order"></textarea>
                        </div>
                        <button type="submit" class="place-order-btn">Place Order</button>
                    </form>
                </div>

                <div class="order-summary">
                    <h2>Order Summary</h2>
                    <div id="orderSummaryContent">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="footer-logo">🛒 GroceryStore</p>
            <p class="footer-copy">&copy; <span id="footerYear"></span> GroceryStore. All rights reserved.</p>
        </div>
    </footer>

    <script>document.getElementById('footerYear').textContent = new Date().getFullYear();</script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
