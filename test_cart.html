<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Test</title>
</head>
<body>
    <h1>Cart API Test</h1>
    <div id="results"></div>
    
    <script>
        // Test cart API directly
        async function testCartAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Testing Cart API...</h2>';
            
            try {
                // Test 1: Get cart (should be empty)
                console.log('TEST 1: Getting cart...');
                const getResponse = await fetch('http://localhost:5000/api/cart', {
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-ID': 'test-session-123'
                    }
                });
                const getCart = await getResponse.json();
                console.log('GET Cart Response:', getCart);
                results.innerHTML += `<p>✅ GET Cart: ${JSON.stringify(getCart)}</p>`;
                
                // Test 2: Add item to cart
                console.log('TEST 2: Adding item to cart...');
                const addResponse = await fetch('http://localhost:5000/api/cart/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-ID': 'test-session-123'
                    },
                    body: JSON.stringify({
                        product_id: 3,
                        quantity: 1
                    })
                });
                const addCart = await addResponse.json();
                console.log('ADD Cart Response:', addCart);
                results.innerHTML += `<p>✅ ADD Cart: ${JSON.stringify(addCart)}</p>`;
                
                // Test 3: Get cart again (should have item)
                console.log('TEST 3: Getting cart after adding...');
                const getResponse2 = await fetch('http://localhost:5000/api/cart', {
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-ID': 'test-session-123'
                    }
                });
                const getCart2 = await getResponse2.json();
                console.log('GET Cart After Add Response:', getCart2);
                results.innerHTML += `<p>✅ GET Cart After Add: ${JSON.stringify(getCart2)}</p>`;
                
            } catch (error) {
                console.error('ERROR:', error);
                results.innerHTML += `<p>❌ ERROR: ${error.message}</p>`;
            }
        }
        
        // Run test when page loads
        window.onload = testCartAPI;
    </script>
</body>
</html>
